<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Black';
            src: url('fontes/Berkahi Blackletter.otf') format('opentype'), url('fontes/Berkahi Blackletter.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /* 
                Tipos de format()
                - opentype (otf)
                - truetype (ttf)
                - embedded-opentype
                - truetype-aat (Apple Advanced Typography)
                - svg

            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Black', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>ola mundo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Natus reiciendis labore quaerat perspiciatis eligendi architecto temporibus dolore incidunt non eaque officiis consequuntur, adipisci similique debitis, aliquid minus beatae aperiam aspernatur?</p>
</body>
</html>
